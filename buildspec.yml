# buildspec.yml
version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies
      
  pre_build:
    commands:
      - echo Installing npm dependencies
      - npm ci
      
  build:
    commands:
      - echo Building the application
      - npm run build
      
  post_build:
    commands:
      - echo Build completed
      - echo Deploying to S3
      - aws s3 sync build/ s3://gudmed.in --delete --exact-timestamps
      - echo Deployment completed

artifacts:
  files:
    - '**/*'
  base-directory: build
  name: gudmed-build-$(date +%Y-%m-%d)

cache:
  paths:
    - 'node_modules/**/*'
